name: daily_stoic_reader
description: The Daily Stoic — your daily Stoic companion.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/dailystoic.jpg"
  windows:
    generate: true
    image_path: "assets/dailystoic.jpg"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/data/entries.json
